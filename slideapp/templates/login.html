<!-- templates/login.html -->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · EasySlides</title>
    {% include "_theme_head.html" %}
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: ui-serif, Georgia, "Songti SC", "Noto Serif CJK SC", serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--ink);
            background:
                linear-gradient(90deg, var(--grid-line-v) 1px, transparent 1px),
                linear-gradient(180deg, var(--grid-line-h) 1px, transparent 1px),
                var(--bg);
            background-size: 22px 22px;
        }

        .login-container {
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            background-color: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 24px;
            color: var(--ink);
        }

        form {
            margin: 0;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--line-strong);
            background: var(--focus-bg);
            color: var(--ink);
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            outline: none;
        }

        button {
            width: 90%;
            padding: 10px;
            background-color: var(--accent);
            border: none;
            color: var(--bg);
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--accent-strong);
        }

        .error {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* 响应式设计 */
        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                margin-top: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="error">{{ form.non_field_errors }}</div>
            {% endif %}
            <input type="text" name="{{ form.username.name }}" placeholder="Username" required>
            {% if form.username.errors %}
                <div class="error">{{ form.username.errors }}</div>
            {% endif %}
            <input type="password" name="{{ form.password.name }}" placeholder="Password" required>
            {% if form.password.errors %}
                <div class="error">{{ form.password.errors }}</div>
            {% endif %}
            <button type="submit">OK</button>
        </form>
    </div>
</body>
</html>
