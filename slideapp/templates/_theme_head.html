{% comment %}主题变量 + 防闪白初始化。必须放在每页 <head> 内、所有 <style> 之前。{% endcomment %}
<link rel="stylesheet" href="/static/css/app-theme.css">
<script>
    (function () {
        var t = localStorage.getItem('easyslides-theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    })();
</script>
